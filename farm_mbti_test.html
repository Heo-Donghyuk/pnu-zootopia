  RAIC: { name: '연구 기반 생명 전문가', desc: '동물생명과학을 혼자서도 꼼꼼하게 연구하는 신중한 전문가. 안정적인 공공기관 연구직에 잘 맞아요.', labs: ['동물번식 연구실', '동물생리 연구실'], career: ['국공립 농업연구원', '수의과학검역원 연구원', '농촌진흥청 연구직'] },
  RPTN: { name: '미래 축산 산업 개척자', desc: '팀과 함께 연구를 통해 새로운 축산 산업을 만들어가는 리더. 대체단백질, 세포배양육, 그린 바이오 분야에 딱 맞아요.', labs: ['축산식품·바이오 연구실', '동물영양 연구실'], career: ['대체단백질 R&D 연구원', '푸드테크 기업 연구팀', '그린 바이오 스타트업 공동창업'] },
  RPTC: { name: '축산 산업 기초 연구자', desc: '팀 연구로 축산 산업의 기반을 탄탄히 쌓는 사람. 사료·영양, 식품 안전 연구에서 꼭 필요한 역할이에요.', labs: ['동물영양 연구실', '축산식품 연구실'], career: ['사료 회사 연구소', '식품안전처 연구원', '농식품부 정책 연구원'] },
  RPIN: { name: '혁신 제품 연구 소규모 창업가', desc: '혼자서도 연구로 새로운 축산 제품을 개발하는 독립 혁신 연구자. 1인 R&D 스타트업, 기술 라이선싱에 강해요.', labs: ['축산식품·바이오 연구실', '동물영양 연구실'], career: ['1인 바이오 스타트업 창업', '기술 이전 컨설턴트', '식품 기업 프리랜서 연구원'] },
  RPIC: { name: '산업 기반 묵묵한 연구자', desc: '혼자서도 묵묵히 전통 축산 산업을 뒷받침하는 연구를 하는 사람. 공공기관 연구직, 품질 인증 기관에 잘 어울려요.', labs: ['동물영양 연구실', '가축생산 연구실'], career: ['국립 식품연구원', '축산물품질평가원', '한국사료협회 연구원'] },
};

let cur = 0;
let answers = {};

function render() {
  const q = questions[cur];
  const pct = Math.round((cur / questions.length) * 100);
  document.getElementById('q-counter').textContent = (cur + 1) + ' / ' + questions.length;
  document.getElementById('q-pct').textContent = pct + '%';
  document.getElementById('prog').style.width = pct + '%';

  const axisLabel = { F: 'F · 집중방식', A: 'A · 친화대상', R: 'R · 관계방식', M: 'M · 사고방식' };
  const isSelected = answers[cur];

  document.getElementById('q-area').innerHTML = `
    <div class="q-card">
      <div class="q-axis">${axisLabel[q.axis]}</div>
      <div class="q-text">${q.text}</div>
      <div class="q-options">
        <div class="q-opt${isSelected === 'a' ? ' selected' : ''}" onclick="select('a')">
          <div class="opt-radio"></div>
          <div>
            <div class="opt-text">${q.a.text}</div>
            <div class="opt-label">${q.a.label}</div>
          </div>
        </div>
        <div class="q-opt${isSelected === 'b' ? ' selected' : ''}" onclick="select('b')">
          <div class="opt-radio"></div>
          <div>
            <div class="opt-text">${q.b.text}</div>
            <div class="opt-label">${q.b.label}</div>
          </div>
        </div>
      </div>
    </div>`;

  document.getElementById('btn-prev').disabled = cur === 0;
  document.getElementById('btn-next').disabled = !isSelected;
  document.getElementById('btn-next').textContent = cur === questions.length - 1 ? '결과 보기 ✓' : '다음 →';
}

function select(opt) {
  answers[cur] = opt;
  render();
}

function prev() {
  if (cur > 0) { cur--; render(); }
}

function next() {
  if (!answers[cur]) return;
  if (cur < questions.length - 1) { cur++; render(); }
  else showResult();
}

function showResult() {
  const scores = { F: 0, R: 0, A: 0, P: 0, T: 0, I: 0, N: 0, C: 0 };
  questions.forEach((q, i) => {
    const opt = answers[i];
    const val = opt === 'a' ? q.a.val : q.b.val;
    scores[val]++;
  });

  const fScore = scores.F; const rScore = scores.R;
  const aScore = scores.A; const pScore = scores.P;
  const tScore = scores.T; const iScore = scores.I;
  const nScore = scores.N; const cScore = scores.C;

  const f = fScore >= rScore ? 'F' : 'R';
  const a = aScore >= pScore ? 'A' : 'P';
  const r = tScore >= iScore ? 'T' : 'I';
  const m = nScore >= cScore ? 'N' : 'C';
  const typeKey = f + a + r + m;
  const type = typeData[typeKey];

  document.getElementById('res-type').textContent = typeKey;
  document.getElementById('res-name').textContent = type.name;
  document.getElementById('res-desc').textContent = type.desc;

  const axisInfo = [
    { label: 'F · 집중방식', left: 'Field', right: 'Research', val: fScore, total: fScore + rScore, pick: f === 'F' ? 'Field' : 'Research' },
    { label: 'A · 친화대상', left: 'Animal', right: 'Product', val: aScore, total: aScore + pScore, pick: a === 'A' ? 'Animal' : 'Product' },
    { label: 'R · 관계방식', left: 'Team', right: 'Indep.', val: tScore, total: tScore + iScore, pick: r === 'T' ? 'Team' : 'Indep.' },
    { label: 'M · 사고방식', left: 'Innovative', right: 'Classic', val: nScore, total: nScore + cScore, pick: m === 'N' ? 'Innovative' : 'Classic' },
  ];

  document.getElementById('axis-bars').innerHTML = axisInfo.map(ax => `
    <div class="axis-result">
      <div class="axis-result-top">
        <div class="axis-result-label">${ax.label}</div>
        <div class="axis-result-val">${ax.pick}</div>
      </div>
      <div class="axis-bar-wrap"><div class="axis-bar" style="width:${Math.round(ax.val/ax.total*100)}%"></div></div>
    </div>`).join('');

  document.getElementById('rec-area').innerHTML = `
    <div class="rec-card">
      <div class="rec-title"><i class="ti ti-microscope" aria-hidden="true" style="font-size:16px;color:#1D9E75;"></i>추천 랩실</div>
      <div class="rec-item">${type.labs.map(l => `<span class="rec-tag">${l}</span>`).join('')}</div>
    </div>
    <div class="rec-card">
      <div class="rec-title"><i class="ti ti-briefcase" aria-hidden="true" style="font-size:16px;color:#1D9E75;"></i>추천 진로</div>
      <div class="rec-item">${type.career.map(c => `<span class="rec-tag">${c}</span>`).join('')}</div>
    </div>`;

  document.getElementById('test-section').style.display = 'none';
  document.getElementById('result-section').style.display = 'block';
}

function restart() {
  cur = 0; answers = {};
  document.getElementById('test-section').style.display = 'block';
  document.getElementById('result-section').style.display = 'none';
  render();
}

render();
</script>
